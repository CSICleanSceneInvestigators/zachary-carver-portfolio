name: Install portfolio headshot

on:
  push:
    paths:
      - '.image-upload/READY'

permissions:
  contents: write

jobs:
  install-headshot:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rebuild JPG and update portfolio
        shell: bash
        run: |
          set -euo pipefail
          cat .image-upload/chunk-* | base64 --decode > assets/zachary-carver-headshot-hq.jpg
          test -s assets/zachary-carver-headshot-hq.jpg
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          old = '<img src="assets/zachary-carver-headshot-hq.svg" alt="Professional headshot of Zachary Carver" class="profile-avatar">'
          new = '<img src="assets/zachary-carver-headshot-hq.jpg" alt="Professional headshot of Zachary Carver" class="profile-avatar" width="512" height="512" decoding="async">'
          if old not in text:
              raise SystemExit('Expected headshot markup was not found.')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          rm -rf .image-upload

      - name: Commit completed headshot upgrade
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets/zachary-carver-headshot-hq.jpg .image-upload
          git commit -m "Upgrade portfolio headshot image quality"
          git push
