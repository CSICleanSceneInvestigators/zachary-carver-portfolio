name: Temporary GitHub storage audit

on:
  push:
    branches:
      - maintenance/github-storage-audit-20260708
    paths:
      - .github/workflows/storage-audit.yml

permissions:
  actions: read
  contents: write
  packages: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Inventory repository storage
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          python - <<'PY'
          import datetime, json, os, pathlib, urllib.error, urllib.parse, urllib.request
          token = os.environ['GH_TOKEN']; repo = os.environ['GITHUB_REPOSITORY']; owner, repo_name = repo.split('/', 1); api = 'https://api.github.com'
          def get(path):
              request = urllib.request.Request(api + path, headers={'Authorization': f'Bearer {token}', 'Accept': 'application/vnd.github+json', 'X-GitHub-Api-Version': '2022-11-28', 'User-Agent': 'csi-storage-audit'})
              try:
                  with urllib.request.urlopen(request, timeout=30) as response: return json.load(response), None
              except urllib.error.HTTPError as exc: return None, {'status': exc.code, 'message': exc.read().decode('utf-8', errors='replace')[:500]}
          def paginate(path, key=None):
              items, errors, page = [], [], 1
              while True:
                  separator = '&' if '?' in path else '?'; data, error = get(f'{path}{separator}per_page=100&page={page}')
                  if error: errors.append(error); break
                  batch = data.get(key, []) if key else data
                  if not batch: break
                  items.extend(batch)
                  if len(batch) < 100: break
                  page += 1
              return items, errors
          artifacts, artifact_errors = paginate(f'/repos/{repo}/actions/artifacts', 'artifacts')
          caches, cache_errors = paginate(f'/repos/{repo}/actions/caches', 'actions_caches')
          packages, package_errors = [], []
          for package_type in ['container', 'npm', 'maven', 'rubygems', 'nuget']:
              visible, errors = paginate(f'/users/{owner}/packages?package_type={package_type}')
              package_errors.extend([{'package_type': package_type, **error} for error in errors])
              for package in visible:
                  package_name = package.get('name'); encoded_name = urllib.parse.quote(package_name or '', safe='')
                  versions, version_errors = paginate(f'/users/{owner}/packages/{package_type}/{encoded_name}/versions')
                  packages.append({'name': package_name, 'package_type': package_type, 'visibility': package.get('visibility'), 'repository': (package.get('repository') or {}).get('full_name'), 'created_at': package.get('created_at'), 'updated_at': package.get('updated_at'), 'versions': versions, 'version_errors': version_errors})
          report = {'repository': repo, 'generated_at': datetime.datetime.now(datetime.timezone.utc).isoformat(), 'artifacts': [{'id': x.get('id'), 'name': x.get('name'), 'size_in_bytes': x.get('size_in_bytes'), 'expired': x.get('expired'), 'created_at': x.get('created_at'), 'expires_at': x.get('expires_at'), 'workflow_run': x.get('workflow_run')} for x in artifacts], 'caches': [{'id': x.get('id'), 'key': x.get('key'), 'ref': x.get('ref'), 'size_in_bytes': x.get('size_in_bytes'), 'created_at': x.get('created_at'), 'last_accessed_at': x.get('last_accessed_at')} for x in caches], 'packages_visible_to_repository_token': packages, 'errors': {'artifacts': artifact_errors, 'caches': cache_errors, 'packages': package_errors}}
          output = pathlib.Path('.github-storage-audit') / f'{repo_name}.json'; output.parent.mkdir(parents=True, exist_ok=True); output.write_text(json.dumps(report, indent=2, sort_keys=True), encoding='utf-8')
          PY
      - name: Commit audit report
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github-storage-audit
          git commit -m "Record GitHub storage audit"
          git push
