name: Bootstrap portfolio

on:
  push:
    paths:
      - ".bootstrap/READY"

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Expand portfolio package
        shell: bash
        run: |
          if [ ! -f .bootstrap/READY ]; then
            echo "Bootstrap marker is absent. Nothing to do."
            exit 0
          fi
          cat .bootstrap/part-* > /tmp/zachary-site.tar.gz.b64
          base64 --decode /tmp/zachary-site.tar.gz.b64 > /tmp/zachary-site.tar.gz
          tar -xzf /tmp/zachary-site.tar.gz
          rm -rf .bootstrap

      - name: Commit portfolio files
        shell: bash
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No portfolio changes to commit."
            exit 0
          fi
          git config user.name "Zachary Carver"
          git config user.email "285810373+CSICleanSceneInvestigators@users.noreply.github.com"
          git add -A
          git commit -m "Launch Zachary Carver technical portfolio"
          git push
