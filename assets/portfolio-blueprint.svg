<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Zachary Carver technical systems portfolio blueprint</title>
  <desc id="desc">A dark technical interface showing automation, APIs, cloud deployment, database engineering, internal tools, product thinking, and selected projects.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#101a31"/></linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#12233d"/><stop offset="1" stop-color="#0b1425"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#5ee7ff"/><stop offset="1" stop-color="#8b7cff"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#5ee7ff" stroke-opacity=".06"/></pattern>
  </defs>
  <rect width="1200" height="700" rx="26" fill="url(#bg)"/>
  <rect width="1200" height="700" rx="26" fill="url(#grid)"/>
